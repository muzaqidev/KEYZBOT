name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-cov

      - name: Lint
        run: ruff check core/ web/ tools/ --select=E,F --ignore=E501,E741,W503

      - name: Syntax check
        run: |
          python -m py_compile core/config.py
          python -m py_compile web/server.py
          python -m py_compile web/streaming.py
          python -m py_compile web/commands.py
          python -c "import core"
          python -c "import tools"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
